<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My-MC.eu | Minecraft Server</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background: #2a2a2a;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #55ff55; margin-bottom: 10px; }
        .ip-box {
            background: #000;
            padding: 15px 25px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 1.5rem;
            cursor: pointer;
            border: 2px dashed #55ff55;
            transition: 0.3s;
            margin: 20px 0;
        }
        .ip-box:hover { background: #111; transform: scale(1.05); }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #555;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .btn:hover { background: #777; }
        #copy-status { font-size: 0.8rem; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Vitaj na My-MC.eu</h1>
        <p>Klikni na IP adresu nižšie a skopíruj ju:</p>
        
        <div class="ip-box" id="server-ip" onclick="copyIP()">
            my-mc.eu
        </div>
        <div id="copy-status">Kliknutím skopíruješ</div>

        <br>
        <a href="navod.html" class="btn">Ako sa pripojiť?</a>
    </div>

    <script>
        function copyIP() {
            const ip = "my-mc.eu";
            navigator.clipboard.writeText(ip).then(() => {
                const status = document.getElementById('copy-status');
                status.innerText = "IP adresa bola skopírovaná!";
                status.style.color = "#55ff55";
                setTimeout(() => {
                    status.innerText = "Kliknutím skopíruješ";
                    status.style.color = "#aaa";
                }, 2000);
            });
        }
    </script>

</body>
</html>
